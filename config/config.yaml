# ==================== 额外WHERE条件配置 ====================
# 用于为特定分类/平台/表添加额外的WHERE限制条件（除分区限制外）
# 优先级：表 > 平台 > 分类（高优先级覆盖低优先级的同名条件）
#  conditions中的每个元素是一个完整的SQL条件字符串
extra_where_conditions:
  # === 按分类维度（最低优先级）===
  by_category:
    # 所有行为变量统一配置产品过滤条件
    "行为变量":
      - "prd_sub_cls_cd IN ('${product_code}')"

  # === 按平台维度（中等优先级，覆盖分类配置）===
  by_platform:
    # "行为变量-总行":
    #   - "part_id >= 202412"
    # "征信变量-消金":
    #   - "ci_rpt_id IS NOT NULL"

  # === 按表维度（最高优先级，覆盖平台和分类配置）===
  by_table:
    # 行为变量的 prd_sub_cls_cd 条件已统一配置在 by_category 中
    # 如需为特定表覆盖或添加额外条件，可在此配置
    # 注：征信变量表的分区条件（part_id >= 202512）已通过 partition_control 配置自动生成
    # 无需在 extra_where_conditions 中重复配置