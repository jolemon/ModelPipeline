    time_function: "MONTHS_BETWEEN"
    window: 3
    direction: "<="
  # === 外部数据-分期乐（范围匹配：近3个月内最近一条） ===
  "edap_mrs.FQZ_BRDT_PF, FQZ_BRDT_DZPF":
