# ==================== 时间区间匹配配置 ====================
# 用于配置需要通过时间区间或等号匹配关联的表
# 支持两种匹配模式：
#   - equality: 等号匹配（如 part_id+1月 = issue_time月份）
#   - range: 范围匹配（如 part_id <= issue_time，且窗口内）
#
# 配置项说明：
#   match_mode: 匹配模式，可选 equality（等号）或 range（范围，默认）
#   time_field: 该表的时间字段名
#   sample_time_field: 样本表的时间字段名（用于比较）
#   time_expr: 表时间字段的转换表达式，{field} 会被替换为字段名
#   sample_expr: 样本时间字段的转换表达式，{field} 会被替换为字段名
#
#   range模式额外需要：
#   time_function: 时间函数，可选 DATEDIFF 或 MONTHS_BETWEEN
#   window: 时间窗口长度
#   direction: 时间方向约束，可选 <= 或 >=（表时间 相对于 样本时间）
#
# 注意：
#   - equality模式：子查询不限制 partition_field = '${biz_date}'，允许跨月份匹配
#   - range模式：子查询限制 partition_field = '${biz_date}'，需要配合ROW_NUMBER去重
#
time_range_joins:
  # === 行为变量-总行（等号匹配：part_id的上一个月 = issue_time的月份） ===
  "wdyy_mrs.T_CC_Cust_Crdt_Info_Stats":
    match_mode: "equality"
    time_field: "part_id"
    sample_time_field: "issue_time"
    time_expr: "to_char(TO_DATE({field}::text, 'YYYYMM') + INTERVAL '1 month', 'YYYYMM')"
    sample_expr: "to_char(TO_DATE({field}::text, 'YYYYMMdd'), 'YYYYMM')"
  "wdyy_mrs.T_CC_Cust_Repay_Info_Stats":
    match_mode: "equality"
    time_field: "part_id"
    sample_time_field: "issue_time"
    time_expr: "to_char(TO_DATE({field}::text, 'YYYYMM') + INTERVAL '1 month', 'YYYYMM')"
    sample_expr: "to_char(TO_DATE({field}::text, 'YYYYMMdd'), 'YYYYMM')"
  "wdyy_mrs.T_CC_Cust_Draw_Info_Stats":
    match_mode: "equality"
    time_field: "part_id"
    sample_time_field: "issue_time"
    time_expr: "to_char(TO_DATE({field}::text, 'YYYYMM') + INTERVAL '1 month', 'YYYYMM')"
    sample_expr: "to_char(TO_DATE({field}::text, 'YYYYMMdd'), 'YYYYMM')"
  "wdyy_mrs.T_CC_Cust_Lmt_Info_Stats":
    match_mode: "equality"
    time_field: "part_id"
    sample_time_field: "issue_time"
    time_expr: "to_char(TO_DATE({field}::text, 'YYYYMM') + INTERVAL '1 month', 'YYYYMM')"
    sample_expr: "to_char(TO_DATE({field}::text, 'YYYYMMdd'), 'YYYYMM')"
  "wdyy_mrs.T_CC_Cust_Lmt_Chg_Info_Stats":
    match_mode: "equality"
    time_field: "part_id"
    sample_time_field: "issue_time"
    time_expr: "to_char(TO_DATE({field}::text, 'YYYYMM') + INTERVAL '1 month', 'YYYYMM')"
    sample_expr: "to_char(TO_DATE({field}::text, 'YYYYMMdd'), 'YYYYMM')"
  "wdyy_mrs.T_CC_Cust_Ovd_Info_Stats":
    match_mode: "equality"
    time_field: "part_id"
    sample_time_field: "issue_time"
    time_expr: "to_char(TO_DATE({field}::text, 'YYYYMM') + INTERVAL '1 month', 'YYYYMM')"
    sample_expr: "to_char(TO_DATE({field}::text, 'YYYYMMdd'), 'YYYYMM')"
  "wdyy.T_CC_CUST_BEHAV_VARBL_PS_A":
    match_mode: "equality"
    time_field: "part_id"
    sample_time_field: "issue_time"
    time_expr: "to_char(TO_DATE({field}::text, 'YYYYMM') + INTERVAL '1 month', 'YYYYMM')"
    sample_expr: "to_char(TO_DATE({field}::text, 'YYYYMMdd'), 'YYYYMM')"
  "wdyy.T_CC_CUST_BEHAV_VARBL_PS_B":
    match_mode: "equality"
    time_field: "part_id"
    sample_time_field: "issue_time"
    time_expr: "to_char(TO_DATE({field}::text, 'YYYYMM') + INTERVAL '1 month', 'YYYYMM')"
    sample_expr: "to_char(TO_DATE({field}::text, 'YYYYMMdd'), 'YYYYMM')"
  "wdyy.T_CC_CUST_BEHAV_VARBL_PS_C":
    match_mode: "equality"
    time_field: "part_id"
    sample_time_field: "issue_time"
    time_expr: "to_char(TO_DATE({field}::text, 'YYYYMM') + INTERVAL '1 month', 'YYYYMM')"
    sample_expr: "to_char(TO_DATE({field}::text, 'YYYYMMdd'), 'YYYYMM')"
  "wdyy.T_CC_CUST_BEHAV_VARBL_INDEX":
    match_mode: "equality"
    time_field: "part_id"
    sample_time_field: "issue_time"
    time_expr: "to_char(TO_DATE({field}::text, 'YYYYMM') + INTERVAL '1 month', 'YYYYMM')"
    sample_expr: "to_char(TO_DATE({field}::text, 'YYYYMMdd'), 'YYYYMM')"
  # === 外部数据-中征信（范围匹配：score_date在issue_time前3个月内，取最新一条） ===
  "jsbrpt.v_ods_02_all_zzxqsf_md5":
    match_mode: "range"
    time_field: "score_date"
    sample_time_field: "issue_time"
    time_expr: "from_unixtime(unix_timestamp(CAST({field} AS string), 'yyyyMMdd'), 'yyyy-MM-dd')"
    sample_expr: "to_date({field}, 'yyyyMMdd')"
    time_function: "MONTHS_BETWEEN"
    window: 3
    direction: "between"
    dedup: true
    dedup_partition_by: "${sample_key}"
    dedup_order_by: "score_date DESC"
    output_time_field: "formatted_score_date"
  # === 外部数据-百融APOLLO（范围匹配：近3个月内最近一条） ===
