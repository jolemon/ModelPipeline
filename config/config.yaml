# lgb2sql 全局配置文件
# 使用 ${work_no}、${model_id}、${product_code} 变量实现一处修改，多处生效
#
# 配置分层（按修改频率降序）：
# [高频] 第1层：核心标识 — 每次换模型必改
# [高频] 第2层：输入输出 — 每次换模型必改
# [中频] 第3层：平台与业务规则 — 业务调整时修改
# [低频] 第4层：SQL生成参数 — 环境升级时修改
# [几乎不动] 第5层：环境映射 — 首次配置后固定

# ============================================
# [高频] 第1层：核心标识
# ============================================
project:
  work_no: "01011939"                         # 工作编号/项目编号
  model_id: "JDJT_GKB"                       # 模型编号（影响临时表命名）
  model_file_id: "jdjt_gkb_20260316_lgb_best_plus"  # 模型文件标识（用于模型文件名）
  product_code: "JDJT"                        # 产品代码（用于变量替换、prd_sub_cls_cd条件）
  date_format: "yyyyMMdd"                     # 日期格式
  target_platform: ""                        # 行为歧义变量解析时优先匹配的目标底座，如"字节"、"京东白条"、"贷中行为变量-新底座"等
  platform_alias: "jdjt"                      # 平台别名，用于替换表名中的 $platform 占位符（如 jdjt / myjb / zxy）

# ============================================
# [高频] 第2层：输入输出配置
# ============================================

# --- 模型文件 ---
model:
  path: input/${model_file_id}.model

# --- 样本表 ---
sample:
  table_name: tmp_${work_no}_20260428_${product_code}_huisu_sample
  key: apply_no
  fields:
    - apply_no
    - cust_id
    - cert_no
    - issue_time
    - apply_mth

# --- 输出表 ---
output:
  table_name: tmp_${work_no}_20260428_${product_code}_var_output
  database: ""
  partition_clause: ""
  
  # 样本表额外字段输出控制
  # true: 在 model_score 和 model_scorecard 表中自动包含 sample.fields 中的所有字段
  # false: 只输出 keep_columns 中的字段
  include_sample_fields: true
  
  # 保留列（主键等，会输出到最终表）
  keep_columns:
    - apply_no

  # 变量字段输出控制（在 model_score 和 model_scorecard 表中）
  variable_output:
    enabled: false          # 默认不输出变量字段
    sort_by_importance: true  # 按特征重要度降序排列
    top_n: 0                # 输出前N个变量，0表示全部

# --- Pipeline 执行 ---
pipeline:
  mode: temp_table
  save_sql: output/${model_id}_pipeline_output.sql
  save_report: output/${model_id}_pipeline_report.md
  generate_score: true

# ============================================
# [中频] 第3层：平台与业务规则
# ============================================

behavior_platform_priority:
  - "贷中行为变量-新底座"
  - "行为变量-总行"
  - "行为变量-消金"
  - "字节"
  - "京东白条"

variable_overrides:
  # 格式: 变量名: {source_table: 表名}
  # unclear_terms:
  #   source_table: "wdyy.t_zxysblhs_zxys_dz_realtime_rollback"

blacklist_vars:
  # - "sensitive_var_name"

credit_primary_table:
  enabled: true
  table_name: "wdyy_mrs.t_pbci_summary_other"
  primary_key: "ci_rpt_id"
  sample_link_key: "be_qry_cert_num"
  sample_bridge_key: "cert_no"
  partition_field: "part_id"
  time_field: "rpt_tm"
  sample_time_field: "issue_time"
  time_window_days: 90
  md5_transform: true
  time_expr: "to_date(substr({field}, 1, 10))"
  sample_expr: "to_date({field})"
  direction: "<="

# ============================================
# [低频] 第4层：SQL生成参数
# ============================================

sql_generation:
  # 最大子查询关联数（同一张临时表内JOIN的子查询数量上限）
  # 超过此数量时，自动拆分为多个临时表
  max_subquery_join: 3

  # 子查询分组策略（当表数量超过max_subquery_join时，如何拆分为多个临时表）
  # sequential: 顺序切分（先装满第一组）
  # balanced: 均衡分配（尽量让每组子查询数量接近）
  subgroup_strategy: balanced

  # 空值填充值
  coalesce_value: -999999

  # 分区字段
  partition_field: "dt"

  # 分区变量名（用于替换）
  # [注意] 当前配置下未被直接使用：所有表均已通过 partition_control / time_range_joins
  # 显式配置分区策略，无表回退到默认的 dt = '${biz_date}' 等值匹配。
  # 保留作为新增表未配置时的默认回退机制。
  partition_var: "${biz_date}"

  # 是否启用组内合并（同一平台的多张临时表合并为中间总表）
  # 例如：征信变量的4个part临时表合并为1个PBCI总表
  group_merge: true

  # 征信平台列表（这些平台会使用 PBCI 桥接表机制，通过 ci_rpt_id 关联）
  # 其他包含"征信"字样的平台（如"中征信"）不属于此列，使用各自真实主键
  credit_platforms:
    - "征信变量-总行"
    - "征信变量-消金"

  # JOIN类型配置（按分类/平台指定JOIN类型）
  # 默认LEFT JOIN，可配置为JOIN（内连接）
  join_types:
    by_category:
      "征信变量": "JOIN"
      "行为变量": "LEFT JOIN"
    by_platform:
      "征信变量-消金": "JOIN"
      "征信变量-总行": "JOIN"
      "行为变量-总行": "LEFT JOIN"
      "行为变量-消金": "LEFT JOIN"
      "贷中行为变量-新底座": "LEFT JOIN"

  # 分区控制策略配置
  # 用于控制子查询中的分区条件生成方式
  # strategy: equality(等值匹配) | range(范围匹配)
  # partition_field: 分区字段名
  # min_partition: range策略下的最早分区值（数字或字符串）
  #
  # 配置位置说明：
  # 1. default: 默认策略，所有未单独配置的表使用此策略
  # 2. by_category: 按变量分类配置（如"征信变量"、"行为变量"）
  # 3. by_platform: 按平台配置（如"征信变量-消金"、"行为变量-总行"），优先级高于by_category
  # 4. by_table: 按表名配置（最高优先级，覆盖其他配置）
  #
  # 优先级：by_table > by_platform > by_category > default
  partition_control:
    # 默认策略：所有表默认使用范围查询
    default:
      strategy: "range"
      partition_field: "dt"
      min_partition: "202401"
    
    # 按分类配置（category字段）
    # 各类型的最早分区配置位置：
    by_category:
      # 征信变量：使用 part_id 分区，最早从 202512 开始
      "征信变量":
        strategy: "range"
        partition_field: "part_id"
        min_partition: "202512"
      
      # 行为变量：使用 dt 分区，最早从 202601 开始
      "行为变量":
        strategy: "range"
        partition_field: "dt"
        min_partition: "202601"

      # 贷中行为变量：使用 data_dt 分区，最早从 20260227 开始
      "贷中行为变量":
        strategy: "range"
        partition_field: "data_dt"
        min_partition: "20260227"
      
      # 外部数据：使用 dt 分区，最早从 202512 开始
      "外部数据":
        strategy: "range"
        partition_field: "dt"
        min_partition: "202512"
    
    # 按平台配置（优先级高于by_category）
    # 如需为特定平台单独配置，在此添加：
    by_platform:
      # 贷中行为变量-新底座：使用 data_dt 分区，最早从 20260227 开始
      # 优先级高于 by_category 中的 "行为变量" 配置
      "贷中行为变量-新底座":
        strategy: "range"
        partition_field: "data_dt"
        min_partition: "20260227"
    
    # 按表配置（最高优先级）
    # 如需为特定表单独配置，在此添加：
    by_table:
      # 中征信：使用 part_id 分区，最早从 202408 开始
      "jsbrpt_mrs.v_ods_02_all_zzxqsf_md5":
        strategy: "range"
        partition_field: "part_id"
        min_partition: "202408"

  # 临时表命名风格
  # simple: 简短命名（unk_001, bh1等）
  # descriptive: 描述性命名（PBCI_part1, bh_Crdt_Info_Stats等）
  naming_style: "descriptive"

# ==================== 后处理配置 ====================
post_process:
  deduplicate: true                   # 是否去重
  dedup_keys:                         # 去重键
    - apply_no
  dedup_order_field: dt               # 去重排序字段
  dedup_order_desc: true              # 是否降序（取最新）
  fill_null: true                     # 是否填充空值
  fill_value: -999999                 # 空值填充值
  null_flag: true                     # 是否标记全空样本
  null_flag_name: all_null_flag       # 全空标记字段名

# ==================== 评分卡配置（可选） ====================
scorecard:
  base_score: 700                     # 基础分
  pdo: 0.1                            # PDO（翻倍odds分差）
  odds_at_base: 50                    # 基础分对应odds
  score_min: 300                      # 最低分
  score_max: 900                      # 最高分

# ==================== 变量类型英文映射（用于临时表命名） ====================
