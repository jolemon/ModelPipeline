# ==================== 禁用变量黑名单配置 ====================
# 当入模变量出现在此列表中时，输出报告会进行告警提示
# 用于标记敏感变量、合规禁用变量或已知有问题的变量
#
# 支持两种配置方式（合并生效）：
# 1. blacklist_vars: 直接在 YAML 中列变量名
# 2. blacklist_file: 指定外部清单文件路径（每行一个变量名）
#
# 优先级：blacklist_vars（YAML中直接定义） + blacklist_file（外部文件）合并使用
# 适用于全局通用禁用清单 + 模型专属补充变量的场景

blacklist_file: "data/禁用变量清单.txt"   # 全局禁用变量清单文件路径

blacklist_vars:
  # 示例：模型专属补充禁用变量
  # - "sensitive_var_name"
  # - "problematic_feature_v1"
  # - "cust_id_card"

# ==================== 自定义JOIN条件配置 ====================
# 用于配置复杂的表关联条件（如MD5转换、时间偏移、多字段关联等）
# 优先级：表 > 平台 > 分类
#
# 配置项说明：
#   join_key: 关联键（覆盖默认的join_key）
#   sample_key: 样本表关联字段（默认与join_key相同）
#   md5_transform: 是否对关联字段进行MD5转换（样本字段 = MD5(表字段)）
#   time_offset: 时间偏移配置
#     field: 样本表时间字段
#     offset_days: 偏移天数（负数为提前）
#     target_field: 目标表时间字段
#     target_expr: 目标表时间字段表达式（可选）
#   custom_on_clause: 自定义ON条件（完全覆盖默认的ON条件）
#
custom_join_conditions:
  # === 贷中行为变量-消金（使用cert_no + MD5 + 时间偏移） ===
  by_table:
    "ads.ads_risk_$platform_cust_dz_indicator_ss":
      join_key: "cert_no"
      sample_key: "cert_no"
      md5_transform: true
      time_offset:
        field: "issue_time"
        offset_days: -2
        target_field: "data_dt"
        target_expr: "cast(to_char(to_date({field}, 'yyyyMMdd') - 2, 'yyyyMMdd') AS int)"
    "ads.ads_risk_$platform_cust_dzys_indicator_ss":
      join_key: "cert_no"
